name: Geo news scrape

on:
  schedule:
    - cron: "5,15,25,35,45,55 * * * *"   # every 10 min, offset by 5 from konglo
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scraper/config_geo.py"
      - "scraper/fetch_geo.py"
      - ".github/workflows/scrape_geo.yml"

permissions:
  contents: write

concurrency:
  group: geo-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - run: pip install -r scraper/requirements.txt

      - name: Fetch geo news
        env:
          NTFY_GEO_TOPIC: ${{ secrets.NTFY_GEO_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
        run: python scraper/fetch_geo.py

      - name: Commit feed
        run: |
          git config user.name "konglo-bot"
          git config user.email "konglo-bot@users.noreply.github.com"
          git add data/geo-feed.json data/geo-seen.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "geo-feed update $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected, rebasing ($i/3)"
            git pull --rebase origin main
          done
          exit 1
